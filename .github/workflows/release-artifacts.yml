name: Release Artifacts

# Two deploy lanes:
#  - Every push to main rebuilds the capypkg modules and overwrites the
#    rolling `latest` GitHub Release.
#  - A semver tag (v1.2.3) cuts a frozen release for that tag.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag to publish (defaults to 'latest')"
        required: false
        default: "latest"
        type: string

permissions:
  contents: read

concurrency:
  group: capyui-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package capypkg modules
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout CapyUI
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential make

      - name: Validate and package
        run: |
          make validate
          make package

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capyui-capypkg-${{ github.run_id }}
          path: |
            build/capypkg/*.bin
            build/capypkg/*.manifest
            build/capypkg/modules-index.txt
          if-no-files-found: erro

      - name: Resolve target release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.release_tag || 'latest' }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh rolling `latest` tag
        if: github.ref_type != 'tag' && steps.tag.outputs.name == 'latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Move (or create) the rolling `latest` tag to the current commit
          # before action-gh-release publishes against it. softprops/action
          # would otherwise create a tag pointing at the wrong commit on
          # rerun.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push -f origin refs/tags/latest

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name == 'latest' && 'CapyUI rolling latest' || format('CapyUI {0}', steps.tag.outputs.name) }}
          body: |
            Automated capypkg release for `${{ steps.tag.outputs.name }}` built
            from commit ${{ github.sha }} on `${{ github.ref_name }}`.

            Consumers should fetch the index via the semver release tag:
              https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/modules-index.txt
          prerelease: ${{ steps.tag.outputs.prerelease }}
          make_latest: ${{ steps.tag.outputs.make_latest }}
          files: |
            build/capypkg/*.bin
            build/capypkg/*.manifest
            build/capypkg/modules-index.txt
