name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "19 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL C/C++
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
      - name: Build
        run: make test
      - uses: github/codeql-action/analyze@v4
  hardening:
    name: Hardened compile gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Security flags
        run: make security
